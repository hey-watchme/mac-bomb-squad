name: BombSquad
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.48.0
options:
  bundleIdPrefix: com.heywatchme
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  BombSquad:
    type: application
    platform: macOS
    info:
      path: BombSquad/Info.plist
      properties:
        CFBundleDisplayName: "Bomb Squad"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: "public.app-category.productivity"
        NSMicrophoneUsageDescription: "音声入力（ASR）で下書きを作成するためにマイクを使用します。"
        CFBundleURLTypes:
          - CFBundleURLName: com.heywatchme.bombsquad.auth
            CFBundleURLSchemes:
              - bombsquad
    dependencies:
      - package: Supabase
        product: Supabase
    sources:
      - BombSquad
      # Bundle the gitignored local auth config so the app reads it regardless of
      # the launch working directory (Finder/Spotlight/Xcode all give CWD "/").
      # The Supabase anon key is a public client key, so bundling is safe.
      # optional: build still works for developers without the file.
      - path: BombSquad.local.plist
        buildPhase: resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heywatchme.bombsquad
        PRODUCT_NAME: BombSquad
        # Stable signing with the Apple Development certificate so the Keychain
        # "Always Allow" choice persists across rebuilds (ad-hoc "-" changes the
        # signature every build and re-prompts each time).
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: 004CF9C3CBE3574A3855E662DCAE27D6AFFE39C2
        PROVISIONING_PROFILE_SPECIFIER: ""
        ENABLE_HARDENED_RUNTIME: NO
