name: BombSquad
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.48.0
options:
  bundleIdPrefix: com.heywatchme
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  BombSquad:
    type: application
    platform: macOS
    dependencies:
      - package: Supabase
        product: Supabase
    sources:
      - BombSquad
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heywatchme.bombsquad
        PRODUCT_NAME: BombSquad
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "音声入力（ASR）で下書きを作成するためにマイクを使用します。"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_CFBundleDisplayName: "Bomb Squad"
        # Stable signing with the Apple Development certificate so the Keychain
        # "Always Allow" choice persists across rebuilds (ad-hoc "-" changes the
        # signature every build and re-prompts each time).
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: 004CF9C3CBE3574A3855E662DCAE27D6AFFE39C2
        PROVISIONING_PROFILE_SPECIFIER: ""
        ENABLE_HARDENED_RUNTIME: NO
